name: Make SDK (macOS)
run-name: Make SDK ${{ inputs.version }}
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Platform Tools Version (release tag)"
        required: true
        default: "36.0.2"
      tag:
        description: "Android Source Tag"
        required: true
        default: "android-17.0.0_r1"

permissions:
  contents: write
  packages: read

jobs:
  make:
    uses: ./.github/workflows/make-sdk.yml
    secrets: inherit
    with:
      platform: macos
      version: ${{ inputs.version }}
      tag: ${{ inputs.tag }}
      targets: >-
        ["x86_64-apple-darwin", "x86_64h-apple-darwin",
         "arm64-apple-darwin", "arm64e-apple-darwin"]
