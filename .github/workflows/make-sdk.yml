name: Make SDK (reusable)
on:
  workflow_call:
    inputs:
      platform:
        description: "linux | bionic | macos | windows | bsd"
        required: true
        type: string
      targets:
        description: "JSON array of target triples"
        required: true
        type: string
      version:
        description: "Platform Tools Version (release tag)"
        required: true
        type: string
      tag:
        description: "Android Source Tag"
        required: true
        type: string
      build_tools_version:
        description: "sdkmanager build-tools package"
        required: false
        type: string
        default: "36.1.0"
      ndk_version:
        description: "Official NDK version for the bionic clang (bionic only)"
        required: false
        type: string
        default: ""
      ndk_revision:
        description: "Official NDK revision letter (bionic only)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  packages: read

jobs:
  make:
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(inputs.targets) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 5120
          swap-size-mb: 5120
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true
          build-mount-path: /mnt

      - name: Move Docker to /mnt
        run: |
          sudo systemctl stop docker.socket docker.service
          sudo mkdir -p /mnt/docker
          sudo rsync -aqP /var/lib/docker/ /mnt/docker/
          sudo rm -rf /var/lib/docker
          sudo ln -s /mnt/docker /var/lib/docker
          sudo systemctl start docker

      - name: Prepare /mnt/build
        run: |
          sudo mkdir -p /mnt/build
          sudo chown $(id -u):$(id -g) /mnt/build
          rmdir "$GITHUB_WORKSPACE"
          ln -s /mnt/build "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Make SDK
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sdk-builder:latest"
          docker run --rm \
            -v "/mnt/build:/work" -w /work --user "$(id -u):$(id -g)" \
            -e HOME=/work \
            -e PLATFORM='${{ inputs.platform }}' \
            -e TARGET='${{ matrix.target }}' \
            -e TAG='${{ inputs.tag }}' \
            -e BUILD_TOOLS_VERSION='${{ inputs.build_tools_version }}' \
            -e NDK_VERSION='${{ inputs.ndk_version }}' \
            -e NDK_REVISION='${{ inputs.ndk_revision }}' \
            -e ROOTDIR=/work \
            "$IMAGE" \
            bash -c 'scripts/fetch-source.sh && scripts/build.sh && scripts/make-sdk.sh'

      - name: Release
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: "${{ inputs.version }}"
          artifacts: ${{ github.workspace }}/android-sdk-${{ matrix.target }}.${{ inputs.platform == 'windows' && '7z' || 'tar.xz' }}
          allowUpdates: true
          replacesArtifacts: true
          body: ''
